name: CIF-Integrity-Pipeline

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'media/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'TEMP.md'
      - 'LICENSE'
      - '.gitignore'
      - '.nomedia'
      - '.npmignore'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'media/**'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build OpenSSL 3.5.0 (ML-DSA Support)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev
          curl -L -o openssl-3.5.0.tar.gz https://github.com/openssl/openssl/releases/download/openssl-3.5.0/openssl-3.5.0.tar.gz
          tar -zxf openssl-3.5.0.tar.gz
          cd openssl-3.5.0
          ./config --prefix=/usr/local/ssl --openssldir=/usr/local/ssl shared zlib
          make -j$(nproc)
          sudo make install
          echo "/usr/local/ssl/lib64" | sudo tee /etc/ld.so.conf.d/openssl-3.5.0.conf
          sudo ldconfig
          echo "PATH=/usr/local/ssl/bin:$PATH" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM Dependencies
        run: npm install

      - name: Run ML-DSA Integrity Shield
        run: |
          openssl version
          openssl pkeyutl -verify -pubin \
            -inkey security/mldsa87_pub.pem \
            -sigfile security/cif.js.sig \
            -in lib/cif.js
