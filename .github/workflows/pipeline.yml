name: CIF-Integrity-Pipeline

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upgrade OpenSSL to 3.5+
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential checkinstall zlib1g-dev
          curl -O https://www.openssl.org/source/openssl-3.5.0.tar.gz
          tar -zxf openssl-3.5.0.tar.gz
          cd openssl-3.5.0
          ./config --prefix=/usr/local/ssl --openssldir=/usr/local/ssl shared zlib
          make -j$(nproc)
          sudo make install
          echo "/usr/local/ssl/lib64" | sudo tee /etc/ld.so.conf.d/openssl-3.5.0.conf
          sudo ldconfig
          echo "PATH=/usr/local/ssl/bin:$PATH" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Execute ML-DSA Integrity Shield
        run: |
          /usr/local/ssl/bin/openssl pkeyutl -verify -pubin \
            -inkey security/mldsa87_pub.pem \
            -sigfile security/cif.js.sig \
            -in lib/cif.js
